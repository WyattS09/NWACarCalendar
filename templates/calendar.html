<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar · NWA Car Events</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}">
</head>
<body>

    <nav>
        <span class="logo">NWA Car Events</span>
        <ul>
            <li><a href="/">Events</a></li>
            <li><a href="/calendar">Calendar</a></li>
            <li><a href="/submit">Submit Event</a></li>
        </ul>
    </nav>

    <div class="calendar-container">

        <div class="calendar-header">
            <div class="calendar-nav">
                <button class="cal-btn" id="prevBtn">&#8592;</button>
                <h2 id="monthYear"></h2>
                <button class="cal-btn" id="nextBtn">&#8594;</button>
            </div>
            <div class="view-toggle">
                <button class="toggle-btn active" id="monthBtn">Month</button>
                <button class="toggle-btn" id="weekBtn">Week</button>
            </div>
        </div>

        <div id="calendarView"></div>

    </div>

    <!-- Event Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <div class="popup-header">
                <span class="popup-type" id="popupType"></span>
                <a href="#" class="popup-link btn" id="popupLink" target="_blank">View Event ↗</a>
            </div>
            <h3 id="popupTitle"></h3>
            <div class="popup-meta" id="popupMeta"></div>
            <p class="popup-desc" id="popupDesc"></p>
            <button class="popup-close" id="popupClose">Close</button>
        </div>
    </div>

    <footer>
        <p>Built for the NWA car community &nbsp;·&nbsp; <a href="https://instagram.com/project.nwacar.media" target="_blank">@project.nwacar.media</a></p>
    </footer>

    <script src="{{ url_for('static', filename='js/calendar.js') }}"></script>

</body>
</html>
